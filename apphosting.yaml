# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Deliberate cost ceiling for current traffic levels. Raising it is safe:
  # rate limiting and sessions are Firestore-backed (durable-rate-limiter,
  # Firebase session cookies), not in-memory, so nothing assumes one instance.
  # Revisit when traffic warrants (e.g. maxInstances: 4).
  maxInstances: 1
