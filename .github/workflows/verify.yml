name: Verify

on:
  pull_request:
  push:
    branches: [main]
  # Weekly run so new dependency advisories against main surface without
  # waiting for the next commit (DEPENDENCY_POLICY.md monthly review trigger).
  schedule:
    - cron: '0 14 * * 1'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - run: npm run env:check:ci
      - run: npm run check
      - run: npm test
      - run: npm run test:rules
      - run: npm run audit:dependencies
      - run: npm run build
      - run: npm ci
        working-directory: functions
      - run: npm run build
        working-directory: functions
