name: Verify

on:
  pull_request:
  push:
    branches: [main]
  # Weekly run so new dependency advisories against main surface without
  # waiting for the next commit (DEPENDENCY_POLICY.md monthly review trigger).
  schedule:
    - cron: '0 14 * * 1'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - run: npm run env:check:ci
      - run: npm run check
      - run: npm test
      - run: npm run test:rules
      - run: npm run audit:dependencies
      - run: npm run build
      - run: npm ci
        working-directory: functions
      - run: npm run build
        working-directory: functions
